name: CI CORBA

on:
  push:
    branches: [ main ]
    paths:
      - 'corba-app/**'
      - '.github/workflows/corba-build.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'corba-app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 8
        uses: actions/setup-java@v5
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: maven

      - name: Build corba-server
        run: mvn -B -f corba-app/corba-server/pom.xml clean verify

      - name: Build corba-client
        run: mvn -B -f corba-app/corba-client/pom.xml clean verify

      - name: Upload Test Results
        uses: actions/upload-artifact@v7
        if: success() || failure()
        with:
          name: test-results
          path: |
            corba-app/corba-server/target/surefire-reports/*.xml
            corba-app/corba-client/target/surefire-reports/*.xml

      - name: Add coverage to PR
        uses: madrapps/jacoco-report@v1.7.2
        if: github.event_name == 'pull_request'
        with:
          paths: |
            corba-app/corba-server/target/site/jacoco/jacoco.xml
            corba-app/corba-client/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80

      - name: Run Checkstyle
        uses: dbelyaev/action-checkstyle@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          checkstyle_config: google_checks.xml
          level: warning
          reporter: github-check
